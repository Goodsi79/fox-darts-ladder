<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Fox at Peasemore – Darts Ladder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* F1‑style dark neon UI */
:root {
  --bg: #05070a;
  --panel: #0f141d;
  --panel-soft: #151b26;
  --border: #1f2933;
  --text: #e5e7eb;
  --muted: #6b7280;
  --accent: #ff8a1f;
  --accent-soft: rgba(255,138,31,0.18);
  --cyan: #00e5ff;
  --danger: #ff4b5c;
  --radius: 12px;
  --shadow: 0 18px 45px rgba(0,0,0,0.65);
  --font: "Inter", sans-serif;
}

body {
  margin: 0;
  font-family: var(--font);
  background: radial-gradient(circle at top, #141b2a 0, #05070a 55%);
  color: var(--text);
  padding: 1rem;
}

.container {
  max-width: 1200px;
  margin: auto;
}

/* Header */
header {
  display: flex;
  align-items: center;
  gap: 1.2rem;
  margin-bottom: 1rem;
}

header img {
  height: 70px;
  border-radius: 14px;
  box-shadow: 0 0 25px rgba(0,0,0,0.7);
}

h1 {
  margin: 0;
  font-size: 1.9rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.header-sub {
  font-size: .85rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .16em;
}

/* Navigation */
.nav-card {
  background: rgba(15,23,42,0.9);
  border-radius: var(--radius);
  border: 1px solid rgba(148,163,184,0.25);
  padding: .6rem .8rem;
  display: flex;
  justify-content: space-between;
  margin-bottom: 1rem;
}

button {
  padding: .55rem 1.1rem;
  border-radius: 999px;
  border: 1px solid transparent;
  cursor: pointer;
  font-weight: 600;
  font-size: .85rem;
  text-transform: uppercase;
}

.btn-primary {
  background: var(--accent);
  color: #111;
}

.btn-secondary {
  background: rgba(15,23,42,0.9);
  color: var(--text);
  border: 1px solid rgba(148,163,184,0.4);
}

.btn-danger {
  background: rgba(127,29,29,0.9);
  color: #fecaca;
  border: 1px solid rgba(248,113,113,0.6);
}

/* Cards */
.card {
  background: linear-gradient(145deg, var(--panel), var(--panel-soft));
  padding: 1.1rem 1.2rem;
  border-radius: var(--radius);
  border: 1px solid rgba(148,163,184,0.25);
  box-shadow: var(--shadow);
  margin-top: 1rem;
}

/* Ladder table */
.table-wrapper {
  margin-top: .6rem;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid rgba(55,65,81,0.8);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: .85rem;
}

th, td {
  padding: .45rem .55rem;
  border-bottom: 1px solid rgba(31,41,55,0.9);
}

tbody tr:hover {
  background: rgba(30,64,175,0.55);
}

/* Inputs */
input, select {
  width: 100%;
  padding: .55rem .6rem;
  border-radius: 999px;
  border: 1px solid rgba(55,65,81,0.9);
  background: rgba(15,23,42,0.95);
  color: var(--text);
}

/* Leg blocks */
.leg-block {
  background: rgba(15,23,42,0.95);
  padding: .8rem .9rem;
  border-radius: 10px;
  border: 1px solid rgba(55,65,81,0.9);
  margin-bottom: .6rem;
}

.notice {
  background: rgba(15,23,42,0.95);
  border-left: 3px solid var(--accent);
  padding: .45rem .6rem;
  border-radius: 8px;
  margin-top: .4rem;
  font-size: .75rem;
}
</style>
</head>

<body>
<div class="container">

<header>
  <img src="fox-logo.png">
  <div>
    <h1>The Fox at Peasemore</h1>
    <div class="header-sub">Darts Ladder • F1‑Style Live Standings</div>
  </div>
</header>

<div class="nav-card">
  <button class="btn-primary" onclick="showPage('ladder')">Ladder</button>
  <button class="btn-secondary" onclick="showPage('history')">Match History</button>
</div>

<!-- PAGE: LADDER -->
<div id="page-ladder">
  <div class="card">
    <h2>Ladder Standings</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Player</th><th>W</th><th>L</th><th>Legs</th><th>Last Match</th>
          </tr>
        </thead>
        <tbody id="ladder-body"></tbody>
      </table>
    </div>

    <div class="flex" style="margin-top:.8rem;">
      <input id="new-player" placeholder="Add player">
      <button class="btn-primary" onclick="addPlayer()">Add</button>
    </div>

    <button class="btn-danger" style="margin-top:1rem;" onclick="resetLadder()">
      Reset Ladder & History
    </button>
    <div id="reset-msg" class="small"></div>
  </div>

  <div class="card">
    <h2>Record Ladder Match</h2>

    <div class="flex">
      <div style="flex:1;">
        <label>Challenger</label>
        <select id="challenger"></select>
      </div>
      <div style="flex:1;">
        <label>Opponent</label>
        <select id="opponent"></select>
      </div>
    </div>

    <h3 style="margin-top:1rem;">Leg Results</h3>
    <div id="legs-area"></div>
    <button class="btn-secondary" onclick="addLeg()">+ Add Leg</button>

    <button class="btn-primary" style="margin-top:1rem;" onclick="submitMatch()">
      Submit Match
    </button>
    <div id="msg" class="small"></div>
  </div>
</div>

<!-- PAGE: HISTORY -->
<div id="page-history" style="display:none;">
  <div class="card">
    <h2>Match History</h2>
    <div id="history-list"></div>
  </div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAvgoAxAaLmJH14tYxJTKOHUNsy3bEwC6A",
  authDomain: "fox-darts-ladder.firebaseapp.com",
  databaseURL: "https://fox-darts-ladder-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fox-darts-ladder",
  storageBucket: "fox-darts-ladder.firebasestorage.app",
  messagingSenderId: "1028079521201",
  appId: "1:1028079521201:web:6ed5afd7348f86ae2cc190"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let ladder = [];

/* PAGE SWITCHING */
function showPage(page) {
  document.getElementById("page-ladder").style.display = page === "ladder" ? "block" : "none";
  document.getElementById("page-history").style.display = page === "history" ? "block" : "none";
}

/* RENDER LADDER */
function renderLadder() {
  const body = document.getElementById("ladder-body");
  body.innerHTML = "";
  ladder.forEach((p,i)=>{
    body.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${p.name}</td>
        <td>${p.w}</td>
        <td>${p.l}</td>
        <td>${p.lf}:${p.la}</td>
        <td>${p.last || "—"}</td>
      </tr>`;
  });
}

/* LOAD LADDER — FIXED (NO renderSelects HERE) */
db.ref("ladder").on("value", snapshot => {
  ladder = snapshot.val() || [];
  renderLadder();
});

/* LOAD HISTORY */
db.ref("history").on("value", snapshot => {
  const data = snapshot.val() || {};
  const list = document.getElementById("history-list");
  list.innerHTML = "";

  Object.values(data).reverse().forEach(m => {
    list.innerHTML += `
      <div style="margin-bottom:1rem; border-bottom:1px solid #333; padding-bottom:.5rem;">
        <strong>${m.winner}</strong> beat <strong>${m.loser}</strong><br>
        <span class="small">${m.timestamp}</span><br>
        <span class="small">${m.movement}</span>
      </div>`;
  });
});

/* SAVE */
function save() {
  db.ref("ladder").set(ladder);
}

/* RESET */
function resetLadder() {
  if (!confirm("Clear ladder AND match history?")) return;
  db.ref("ladder").set([]);
  db.ref("history").set([]);
  ladder = [];
  renderLadder();
  renderSelects();
  document.getElementById("reset-msg").textContent = "Ladder reset.";
}

/* ADD PLAYER */
function addPlayer() {
  const name = document.getElementById("new-player").value.trim();
  if (!name) return;
  ladder.push({name, w:0, l:0, lf:0, la:0, last:null});
  document.getElementById("new-player").value = "";
  save();
  renderSelects();
}

/* SELECT OPTIONS */
function renderSelects() {
  const c = document.getElementById("challenger");
  const o = document.getElementById("opponent");
  c.innerHTML = `<option value="">Select</option>`;
  o.innerHTML = `<option value="">Select</option>`;

  ladder.forEach((p,i)=>{
    c.innerHTML += `<option value="${i}">${p.name}</option>`;
  });
}

document.getElementById("challenger").addEventListener("change", ()=>{
  const idx = parseInt(document.getElementById("challenger").value);
  const o = document.getElementById("opponent");
  o.innerHTML = `<option value="">Select</option>`;
  ladder.forEach((p,i)=>{
    if (i < idx && idx - i <= 3) {
      o.innerHTML += `<option value="${i}">${p.name}</option>`;
    }
  });
});

/* LEG ENTRY */
function addLeg() {
  const area = document.getElementById("legs-area");
  const id = Date.now();
  area.innerHTML += `
    <div class="leg-block" id="leg-${id}">
      <label>Leg winner</label>
      <select class="leg-winner">
        <option value="">Select</option>
        <option value="challenger">Challenger</option>
        <option value="opponent">Opponent</option>
      </select>

      <label class="small"><input type="checkbox" class="leg-45"> 45 darts reached</label>

      <div class="nearest-bull-area" style="display:none;">
        <div class="notice">Nearest bull must decide this leg.</div>
        <label class="small"><input type="checkbox" class="leg-bull"> Nearest bull used</label>
      </div>
    </div>`;

  const block = document.getElementById(`leg-${id}`);
  const cb45 = block.querySelector(".leg-45");
  const bullArea = block.querySelector(".nearest-bull-area");

  cb45.addEventListener("change", ()=>{
    bullArea.style.display = cb45.checked ? "block" : "none";
  });
}
addLeg();

/* SUBMIT MATCH */
function submitMatch() {
  const msg = document.getElementById("msg");
  msg.textContent = "";

  const c = parseInt(document.getElementById("challenger").value);
  const o = parseInt(document.getElementById("opponent").value);
  if (isNaN(c) || isNaN(o)) {
    msg.textContent = "Select challenger and opponent.";
    return;
  }

  const legs = [...document.querySelectorAll(".leg-block")].map(block=>{
    return {
      winner: block.querySelector(".leg-winner").value,
      reached45: block.querySelector(".leg-45").checked,
      bull: block.querySelector(".leg-bull")?.checked || false
    };
  });

  const cLegs = legs.filter(l=>l.winner==="challenger").length;
  const oLegs = legs.filter(l=>l.winner==="opponent").length;

  if (cLegs < 2 && oLegs < 2) {
    msg.textContent = "Someone must reach 2 legs.";
    return;
  }

  const winner = cLegs > oLegs ? c : o;
  const loser  = cLegs > oLegs ? o : c;

  ladder[winner].w++;
  ladder[loser].l++;

  const stamp = new Date().toLocaleString();
  ladder[winner].last = `W vs ${ladder[loser].name} (${stamp})`;
  ladder[loser].last  = `L vs ${ladder[winner].name} (${stamp})`;

  if (winner > loser) {
    const moved = ladder.splice(winner,1)[0];
    ladder.splice(loser,0,moved);
  }

  db.ref("history").push({
    challenger: ladder[c].name,
    opponent: ladder[o].name,
    winner: ladder[winner].name,
    loser: ladder[loser].name,
    legs,
    timestamp: stamp,
    movement: winner > loser ? `Moved from ${winner+1} to ${loser+1}` : "No movement"
  });

  save();
  msg.textContent = "Match recorded.";
}
</script>

</body>
</html>
